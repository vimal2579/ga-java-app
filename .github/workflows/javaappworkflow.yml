name: Java Application Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build job
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up jdk 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' 
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package

      - name: run tests
        run: mvn test